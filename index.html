<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giridhar Reddy</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            min-height: 100vh;
            background: url("background.jpg") center/cover no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* MAIN CONTAINER */

        .container {
            width: 90%;
            max-width: 1000px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* LEFT SECTION */

        .left {
            text-align: center;
        }

        .left img {
            width: 220px;
            height: 300px;
            border-radius: 50%;
            object-fit: cover;
        }

        /* SOCIAL ICONS */

        .social {
            margin-top: 20px;
        }

        .social a {
            color: black;
            font-size: 24px;
            margin: 0 10px;
            text-decoration: none;
            transition: 0.4s;
        }

        .social a:hover {
            transform: rotate(360deg);
            color: #444;
        }

        /* RIGHT SECTION */

        .right {
            text-align: left;
        }

        .right h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .right p {
            letter-spacing: 3px;
            font-size: 14px;
            margin-bottom: 25px;
        }

        /* BUTTONS */

        .buttons a {
            display: block;
            width: 260px;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid black;
            text-align: center;
            text-decoration: none;
            color: black;
            border-radius: 6px;
            transition: 0.3s;
        }

        .buttons a:hover {
            background: black;
            color: white;
        }
    </style>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body>

    <div class="container">

        <div class="left">

            <img src="Photo.jpg" alt="Profile Photo">

            <div class="social">

                <a href="https://www.instagram.com" target="_blank">
                    <i class="fab fa-instagram"></i>
                </a>

                <a href="https://www.facebook.com" target="_blank">
                    <i class="fab fa-facebook-f"></i>
                </a>

                <a href="https://twitter.com" target="_blank">
                    <i class="fab fa-twitter"></i>
                </a>

            </div>

        </div>


        <div class="right">

            <h1>Giridhar Reddy</h1>
            <p>SOFTWARE DEVELOPER</p>

            <div class="buttons">
                <a href="#">ABOUT ME</a>
                <a href="#">LOOKBOOK</a>
                <a href="#">COLLABORATIONS</a>
                <a href="#">WORK WITH ME</a>
            </div>

        </div>

    </div>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astrid Daniels</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #e5e5e5;
        }

        .container {
            width: 1100px;
            height: 500px;
            background: url("background.jpg") center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 40px;
            border-radius: 10px;
        }

        /* LEFT SECTION */

        .left {
            text-align: center;
        }

        .left img {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            object-fit: cover;
        }

        .social {
            margin-top: 20px;
        }

        .social i {
            font-size: 24px;
            margin: 0 10px;
            color: white;
            cursor: pointer;
        }

        /* RIGHT SECTION */

        .right {
            color: white;
            text-align: left;
        }

        .right h1 {
            font-size: 32px;
            margin-bottom: 5px;
        }

        .right p {
            letter-spacing: 2px;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .buttons a {
            display: block;
            width: 260px;
            padding: 12px;
            margin: 12px 0;
            border: 2px solid white;
            text-align: center;
            text-decoration: none;
            color: white;
            border-radius: 5px;
            transition: 0.3s;
        }

        .buttons a:hover {
            background: white;
            color: black;
        }
    </style>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body>

    <div class="container">

        <div class="left">
            <img src="photo.jpg" alt="photo">

            <div class="social">
                <i class="fab fa-instagram"></i>
                <i class="fab fa-facebook-f"></i>
                <i class="fab fa-twitter"></i>
            </div>
        </div>


        <div class="right">
            <h1>Astrid Daniels</h1>
            <p>BEAUTY AND FASHION</p>

            <div class="buttons">
                <a href="#">ABOUT ME</a>
                <a href="#">LOOKBOOK</a>
                <a href="#">COLLABORATIONS</a>
                <a href="#">WORK WITH ME</a>
            </div>

        </div>

    </div>

</body>

</html>
